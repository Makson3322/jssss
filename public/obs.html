<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>OBS Overlay</title>
  <link rel="stylesheet" href="/style.css">
  <style>
    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: transparent !important;
    }
    body.obs-only, body.obs-only * {
      background-color: transparent !important;
      background-image: none !important;
    }
    .app {
      display: block !important;
      width: 100vw;
      height: 100vh;
      background: transparent !important;
    }
    .center {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: transparent !important;
    }
    .viewport {
      position: absolute;
      inset: 0;
      overflow: hidden;
      background: transparent !important;
    }
    .world {
      position: absolute;
      width: 1920px;
      height: 1080px;
      transform-origin: 0 0;
      background: transparent !important;
    }
    .asset, .asset-inner, .asset img, .asset video, .asset iframe {
      background: transparent !important;
    }
    .asset .name-tag, .asset .handle, .zone, .selection-box {
      display: none !important;
    }
  </style>
</head>
<body class="obs-only">
  <div class="app">
    <main class="center">
      <div class="viewport" id="viewport">
        <div class="world" id="world"></div>
      </div>
    </main>
  </div>
  <script src="/obs-lite.js"></script>
</body>
</html>
<!-- END OF FILE public/obs.html -->
