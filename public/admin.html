<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Dashboard | Poltergeist</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="brand">
        <div class="avatar"></div>
        <div>
          <h1 id="userName">Загрузка...</h1>
          <div style="display:flex; gap:8px; margin-top:6px; align-items:center; flex-wrap:wrap">
            <span class="pill gold">Broadcast Suite</span>
            <span class="pill" id="roomPill">room: default</span>
          </div>
        </div>
      </div>

      <div class="section">
        <div class="section-title"><span>Spawn assets</span><span class="small">click</span></div>
        <div class="grid2" id="spawnButtons"></div>
      </div>

      <div class="section">
        <div class="section-title"><span>Tools</span><span class="small">Editor</span></div>
        <button class="btn sm" id="fitBtn">🗺 Fit view</button>
      </div>
    </aside>

    <main class="center">
      <div class="viewport" id="viewport">
        <div class="world" id="world">
          <div class="zone live"><div class="tag">Livestream area // 1920x1080</div></div>
          <div class="zone stage"><div class="tag">Staging area</div></div>
          <div class="selection-box" id="selectionBox"></div>
        </div>
      </div>
      <div class="help">Wheel zoom · middle drag pan</div>
      <div class="statusbar" id="netStatus">NET: 0/s</div>
    </main>
  </div>
  <script src="/socket.io/socket.io.js"></script>
  <script src="/app.js"></script>
</body>
</html>
